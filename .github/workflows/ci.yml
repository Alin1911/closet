name: CI

on:
  pull_request:
  push:
    branches: [ main, master, copilot/** ]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 22
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 22
      - name: Run backend tests
        run: ./mvnw --no-transfer-progress test

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: closet-client-v1
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: closet-client-v1/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Test
        run: CI=true npm test -- --watchAll=false --passWithNoTests
