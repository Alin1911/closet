spring.application.name=closets
spring.data.mongodb.database=${MONGO_DATABASE}
spring.data.mongodb.uri=mongodb+srv://${MONGO_USER}:${MONGO_PASSWORD}@${MONGO_CLUSTER}
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when_authorized
management.tracing.sampling.probability=1.0
auth.access-token.ttl-seconds=900
auth.refresh-token.ttl-seconds=604800
logging.pattern.level=%5p [requestId:%X{requestId:-}]
